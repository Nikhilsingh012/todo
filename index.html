<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>📝 To-Do List</h1>

    <form id="todo-form" class="todo-form">
      <input id="todo-input" type="text" placeholder="Add a new task..." required />
      <button type="submit">Add</button>
    </form>

    <div class="controls">
      <button id="clear-completed" class="secondary">Clear Completed</button>
      <button id="clear-all" class="danger">Clear All</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>
    <p id="empty-state" class="empty-state">No tasks yet. Add one above 👆</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
